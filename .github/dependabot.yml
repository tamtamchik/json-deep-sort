version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7

  # Workflows pin actions by full commit SHA; Dependabot updates those pins.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
